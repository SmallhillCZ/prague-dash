name: Release to DEV

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_short_sha.outputs.short_sha }}
    steps:
      - name: Set short SHA
        id: set_short_sha
        run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
      - name: Print resolved version
        run: 'echo "Version: ${{ steps.set_short_sha.outputs.short_sha }}"'

  test-unit:
    name: Unit Tests
    uses: ./.github/workflows/_test-unit.yaml

  build:
    name: Build
    needs:
      - version
    uses: ./.github/workflows/_build.yaml
    with:
      version: ${{ needs.version.outputs.new_version }}

  test-e2e:
    name: E2E Tests
    needs:
      - build
    uses: ./.github/workflows/_test-e2e.yaml

  publish:
    name: Publish
    needs:
      - build
      - test-unit
      - test-e2e
    uses: ./.github/workflows/_publish.yaml
    with:
      tag: dev
    secrets: inherit

  deploy:
    name: Deploy
    needs:
      - publish
    uses: ./.github/workflows/_deploy.yaml
    with:
      images: ghcr.io/smalhillcz/prague-dash:dev

  tag:
    name: Tag
    needs: publish
    uses: ./.github/workflows/_tag.yaml
    with:
      tag: DEV

  cleanup:
    name: Cleanup artifacts
    needs: publish
    uses: ./.github/workflows/_cleanup-artifacts.yaml
