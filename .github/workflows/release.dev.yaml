name: Release to DEV

on:
  workflow_dispatch:
    inputs:
      semver:
        description: "Version bump"
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  version:
    name: Resolve version
    uses: ./.github/workflows/_version.yaml
    with:
      semver: ${{ github.event.inputs.semver }}
      prerelease: false

  test-unit:
    name: Unit Tests
    uses: ./.github/workflows/_test-unit.yaml

  build:
    name: Build
    needs:
      - version
    uses: ./.github/workflows/_build.yaml
    with:
      version: ${{ needs.version.outputs.version }}

  test-e2e:
    name: E2E Tests
    needs:
      - build
    uses: ./.github/workflows/_test-e2e.yaml

  publish:
    name: Publish
    needs:
      - build
      - test-unit
      - test-e2e
    uses: ./.github/workflows/_publish.yaml
    with:
      tag: dev
    secrets: inherit

  deploy:
    name: Deploy
    needs:
      - publish
    uses: ./.github/workflows/_deploy.yaml
    with:
      images: ghcr.io/smallhillcz/prague-dash:dev

  tag:
    name: Tag
    needs:
      - publish
      - version
    uses: ./.github/workflows/_tag.yaml
    with:
      tag: DEV
      version: ${{ needs.version.outputs.version }}

  cleanup:
    name: Cleanup artifacts
    needs: publish
    uses: ./.github/workflows/_cleanup-artifacts.yaml
