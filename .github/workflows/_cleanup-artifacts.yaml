name: Cleanup artifacts

on:
  workflow_call:

jobs:
  cleanup-artifacts:
    name: Cleanup artifacts
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete build artifacts
        uses: geekyeggo/delete-artifact@176a747ab7e287e3ff4787bf8a148716375ca118 # v6.0.0
        with:
          name: |
            *-docker-image
          failOnError: false
