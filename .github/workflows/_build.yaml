name: Build

on:
  workflow_call:
    inputs:
      version:
        description: "Version to use for the built Docker images"
        type: string
        required: false

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - backend
    steps:
      - name: Checkout the updated source code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          target: ${{ matrix.target }}
          tags: ${{ matrix.target }}:${{ github.sha }}
          outputs: type=docker,dest=${{ runner.temp }}/${{ matrix.target }}-docker-image.tar
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          build-args: VERSION=${{ inputs.version }}

      - name: Upload Docker image tarball
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}-docker-image
          path: ${{ runner.temp }}/${{ matrix.target }}-docker-image.tar
          retention-days: 1
