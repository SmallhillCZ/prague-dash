name: Resolve version

on:
  workflow_call:
    inputs:
      semver:
        description: "Version bump"
        required: true
        type: string
        default: none
      prerelease:
        description: "Prerelease version"
        type: boolean
        required: false
        default: false
    outputs:
      version:
        description: "Resolved version tag"
        value: ${{ jobs.version.outputs.version }}

jobs:
  version:
    name: Resolve version tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: "0"

      - name: Resolve version tag
        id: version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          TAG_PREFIX: v
          PRERELEASE: ${{ inputs.prerelease }}
          DEFAULT_BUMP: ${{ inputs.semver }}
          PRERELEASE_SUFFIX: rc
          DRY_RUN: true
          FORCE_WITHOUT_CHANGES: true
          FORCE_WITHOUT_CHANGES_PRE: true
          RELEASE_BRANCHES: no_release_branches_exist # otherwise prerelease is not generated for main branch

      - name: Print resolved tags
        run: |
          echo "New tag: ${{ steps.version.outputs.new_tag }}"
          echo "Old tag: ${{ steps.version.outputs.old_tag }}"
